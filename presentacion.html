<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Android Market · Servicio Técnico Digital — Presentación</title>
<style>
  :root{
    --brand:#059669; --brand-lt:#10b981; --dark:#0b1220; --dark-card:#16213a;
    --ink:#121826; --muted:#667085; --pale:#e4f4ec; --border:#e3e8ee;
    --light:#f5f8f6; --red:#e5533c; --redpale:#fce7e2;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .deck{position:fixed;inset:0;overflow:hidden}
  .slide{position:absolute;inset:0;display:flex;align-items:center;padding:5.5vh 6vw;opacity:0;visibility:hidden;transition:opacity .35s ease;overflow:hidden}
  .slide.active{opacity:1;visibility:visible}
  .slide.light{background:var(--light);color:var(--ink)}
  .slide.dark{background:var(--dark);color:#fff}
  .inner{width:100%;max-width:1200px;margin:0 auto}
  .kicker{font-size:clamp(11px,1.05vw,13.5px);font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);margin-bottom:.5em}
  .dark .kicker{color:var(--brand-lt)}
  h1{font-size:clamp(26px,4vw,46px);font-weight:800;line-height:1.08;margin:0 0 .1em;letter-spacing:-.01em}
  .lead{font-size:clamp(14px,1.55vw,18px);line-height:1.5;color:var(--ink)}
  .muted{color:var(--muted)}
  .row{display:flex;gap:18px}
  .grid{display:grid;gap:18px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .card{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 22px rgba(16,24,40,.06);padding:20px 22px}
  .card h3{margin:.1em 0 .15em;font-size:clamp(15px,1.5vw,18px);font-weight:700}
  .card p{margin:0;font-size:clamp(12px,1.25vw,14px);color:var(--muted);line-height:1.4}
  .ic{flex:0 0 auto;width:52px;height:52px;border-radius:50%;background:var(--pale);color:var(--brand);display:flex;align-items:center;justify-content:center}
  .ic svg{width:26px;height:26px}
  .ic.red{background:var(--redpale);color:var(--red)}
  .icon{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .chip{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  .chip .ic{width:44px;height:44px}
  .chip .ic svg{width:22px;height:22px}
  .step{flex:1;min-width:0;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 22px rgba(16,24,40,.06);padding:16px 6px;text-align:center}
  .num{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;font-weight:800;font-size:clamp(15px,1.6vw,19px);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
  .step b{font-size:clamp(11px,1.2vw,14px)}
  .arrow{align-self:center;color:var(--brand-lt);font-size:clamp(18px,2vw,26px);font-weight:800}
  /* dark helpers */
  .dark .lead{color:#c7d2e0}
  .stackbox{width:min(560px,80%);margin:0 auto;background:var(--dark-card);border:1px solid #2a3858;border-radius:12px;padding:16px;text-align:center;font-weight:700;font-size:clamp(14px,1.7vw,18px)}
  .stackbox.brand{background:var(--brand);border-color:var(--brand)}
  .down{color:var(--brand-lt);text-align:center;font-size:18px;margin:6px 0}
  .dchip{display:flex;align-items:center;gap:10px;background:var(--dark-card);border:1px solid #2a3858;border-radius:30px;padding:10px 16px;font-weight:700;font-size:clamp(11px,1.2vw,13px)}
  .dchip svg{width:18px;height:18px;color:var(--brand-lt);stroke-width:2}
  .pill{display:inline-block;background:var(--brand);color:#fff;font-size:11px;font-weight:800;letter-spacing:.08em;padding:4px 10px;border-radius:20px}
  /* misc */
  .brandmark{width:60px;height:60px;border-radius:13px;background:var(--brand);display:flex;align-items:center;justify-content:center}
  .brandmark svg{width:28px;height:28px;color:#fff;stroke-width:2}
  .blob{position:absolute;border-radius:50%;filter:blur(2px);opacity:.16;background:var(--brand)}
  .note{background:#fff;border:1.5px solid var(--brand);border-radius:12px;padding:16px 20px;font-size:clamp(12px,1.3vw,15px);line-height:1.45}
  .note.pale{background:var(--pale)}
  /* HUD */
  #hud{position:fixed;right:16px;bottom:12px;z-index:50;display:flex;align-items:center;gap:12px;font-family:var(--sans);font-size:12px;color:#94a3b8}
  #hud button{cursor:pointer;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#cbd5e1;border-radius:8px;padding:5px 9px;font-size:12px}
  .slide.light ~ #hud{color:#94a3b8}
  #hint{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;z-index:50;font-size:11.5px;color:#94a3b8;transition:opacity .6s ease}
  .footer{position:absolute;left:6vw;bottom:2.6vh;font-size:11px;color:var(--muted)}
  .dark .footer{color:#7f8aa0}
  @media (max-width:700px){ .g3,.g4{grid-template-columns:1fr 1fr} h1{font-size:30px} }
</style>
</head>
<body>

<script>function I(id,cls){return '<svg class="'+(cls||'icon')+'"><use href="#'+id+'"/></svg>'}</script>

<div class="deck" id="deck"></div>

<div id="hud"><button id="fs" title="Pantalla completa (F)">⛶ Pantalla completa</button><span id="counter">1 / 16</span></div>
<div id="hint">← → para navegar · clic para avanzar</div>

<script>
const D = [];

/* 1 PORTADA */
D.push(`<section class="slide dark">
  <div class="blob" style="width:520px;height:520px;right:-120px;top:-180px"></div>
  <div class="blob" style="width:340px;height:340px;right:120px;bottom:-120px;background:var(--brand-lt)"></div>
  <div class="inner">
    <div class="brandmark">${I('i-wrench')}</div>
    <h1 style="font-size:clamp(40px,7vw,76px);margin-top:.35em">Android Market</h1>
    <div style="font-size:clamp(20px,2.8vw,30px);font-weight:800;color:var(--brand-lt)">Servicio Técnico Digital</div>

    <div style="font-weight:700">Rurrenabaque, Beni · Bolivia</div>
    <div style="color:#8fa0b5;font-size:13px;margin-top:6px">Tecnología de la Información II · Carlos Paz · Noé Flores · Esequiel Flores · Yeis Chipunavi · Daniel Gómez</div>
  </div>
</section>`);

/* 2 PROBLEMA */
const probs=[['Órdenes perdidas','Equipos sin seguimiento, nadie sabe dónde están.'],['Estados poco claros','No se sabe en qué etapa va cada reparación.'],['Sin estadísticas','No se sabe cuánto se gana ni qué se repara más.'],['Cliente sin información','Llama una y otra vez para preguntar.']];
D.push(`<section class="slide light"><div class="inner">
  <div class="kicker">El problema</div><h1>Hoy se gestiona con papel, WhatsApp y memoria</h1>
  <div class="grid g2" style="margin-top:26px">
  ${probs.map(p=>`<div class="card row"><div class="ic red">${I('i-x')}</div><div><h3>${p[0]}</h3><p>${p[1]}</p></div></div>`).join('')}
  </div></div><div class="footer">Android Market · Servicio Técnico Digital</div></section>`);

/* 3 SOLUCIÓN */
const sol=[['i-wifi','Funciona sin internet','Ideal para Rurrenabaque.'],['i-laptop','En una sola laptop','Sin servidores ni nube.'],['i-tags','Sin costos mensuales','Cero gastos de hosting.']];
D.push(`<section class="slide light"><div class="inner">
  <div class="kicker">La solución</div><h1>Una aplicación web que digitaliza todo el proceso</h1>
  <div class="row" style="margin-top:26px;gap:42px;align-items:flex-start">
    <p class="lead" style="flex:1.1;font-size:clamp(15px,1.7vw,19px)">El cliente y su equipo se registran una sola vez. Desde la recepción hasta la entrega, toda la información queda en un solo lugar — y el cliente puede ver el estado en línea.</p>
    <div style="flex:1;display:flex;flex-direction:column;gap:14px">
    ${sol.map(s=>`<div class="chip"><div class="ic">${I(s[0])}</div><div><h3 style="margin:0;font-size:15px">${s[1]}</h3><p style="font-size:12.5px">${s[2]}</p></div></div>`).join('')}
    </div>
  </div></div><div class="footer">Android Market · Servicio Técnico Digital</div></section>`);

/* 4 PROCESO */
const steps=['Recepción','Diagnóstico','Reparación','Inventario','Pago','Entrega','Reportes'];
D.push(`<section class="slide light"><div class="inner">
  <div class="kicker">El proceso digitalizado</div><h1>Del ingreso a la entrega, todo en un solo lugar</h1>
  <div class="row" style="margin-top:42px;gap:4px;align-items:stretch">

  </div><div class="footer">Android Market · Servicio Técnico Digital</div></section>`);

/* 5 FUNCIONES */
const fns=[['i-users','Clientes'],['i-phone','Equipos'],['i-clip','Órdenes'],['i-cog','Técnicos'],['i-box','Inventario'],['i-money','Pagos'],['i-pdf','Comprobante PDF'],['i-chart','Dashboard'],['i-qr','Estado por QR'],['i-search','Búsqueda global'],['i-db','Respaldo de datos'],['i-book','Documentación']];
D.push(`<section class="slide light"><div class="inner">
  <div class="kicker">Funciones</div><h1>Todo lo que ya está construido</h1>
  <div class="grid g3" style="margin-top:22px;gap:14px">

/* 6 DOS LADOS */
D.push(`<section class="slide light"><div class="inner">
  <div class="kicker">Dos lados</div><h1>Una parte para el cliente, otra para el taller</h1>
  <div class="grid g2" style="margin-top:24px">

      <div class="row" style="align-items:center;gap:14px"><div class="brandmark" style="width:50px;height:50px;border-radius:12px">${I('i-qr')}</div><h3 style="font-size:clamp(17px,2vw,22px);margin:0">Lado Cliente</h3></div>

/* 7 ARQUITECTURA */
const stack=[['Navegador',0],['Next.js',0],['Prisma',0],['SQLite (archivo local)',1]];

/* 8 BUENAS PRÁCTICAS */

/* 9 DEMOSTRACIÓN */
const demo=['El cliente llega al taller','Se crea la orden (REP-2026-…)','Se agrega el repuesto usado','Se actualiza el estado','Se registra el pago (total)','Se genera el comprobante (PDF + QR)','El cliente consulta el estado en línea'];
D.push(`<section class="slide dark"><div class="inner">

D.push(`<section class="slide dark"><div class="blob" style="width:560px;height:560px;left:-200px;bottom:-160px"></div><div class="inner">

/* 11 ETAPAS */
const stg=[['1','Una laptop en el taller','Hoy. Recepción, técnico y jefe. Sin costos.',1],['2','Varios equipos en el taller','Todos acceden por la red local (WiFi).',0],['3','App instalable (PWA)','En celular, tablet y PC. Sin Play Store.',0],['4','Vender a otros talleres','El mismo sistema para muchos talleres — un producto.',0],['5','Plataforma en la nube (SaaS)','Varios talleres, pago mensual.',0]];
D.push(`<section class="slide light"><div class="inner">
  <div class="kicker">Evolución</div><h1>Cinco etapas de crecimiento</h1>
  <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">

    <b style="flex:0 0 34%;font-size:clamp(14px,1.6vw,17px)">${s[1]}</b>

  </div></div><div class="footer">Android Market · Servicio Técnico Digital</div></section>`);

/* 12 COMPANY */
D.push(`<section class="slide light"><div class="inner">
  <div class="kicker">Decisión clave</div><h1>Preparado para muchos talleres</h1>
  <div class="row" style="margin-top:24px;align-items:center;gap:20px">

/* ===== render + navigation ===== */
document.getElementById('deck').innerHTML = D.join('');
const slides=[...document.querySelectorAll('.slide')];
const counter=document.getElementById('counter');
let i=0;
function show(n){ i=Math.max(0,Math.min(slides.length-1,n)); slides.forEach((s,k)=>s.classList.toggle('active',k===i)); counter.textContent=(i+1)+' / '+slides.length; location.hash=i+1; }
function next(){show(i+1)} function prev(){show(i-1)}
addEventListener('keydown',e=>{
  if(['ArrowRight',' ','PageDown','Enter'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','PageUp','Backspace'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){show(0)} else if(e.key==='End'){show(slides.length-1)}
  else if(e.key.toLowerCase()==='f'){toggleFs()}
});
addEventListener('click',e=>{ if(e.target.closest('#hud'))return; (e.clientX>innerWidth*0.5?next:prev)(); });
function toggleFs(){ if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen()} else {document.exitFullscreen&&document.exitFullscreen()} }
document.getElementById('fs').addEventListener('click',e=>{e.stopPropagation();toggleFs()});
addEventListener('hashchange',()=>{const h=(parseInt(location.hash.replace('#',''))||1)-1; if(h!==i) show(h);});
const start=parseInt(location.hash.replace('#',''))||1; show(start-1);
setTimeout(()=>{const h=document.getElementById('hint');if(h)h.style.opacity='0';},6000);
</script>
